name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: atlas_edu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/atlas_edu_test
      JWT_SECRET: ci-test-jwt-secret-at-least-16-chars
      OPENCODE_GO_API_KEY: ci-test-key-placeholder
      OPENCODE_GO_BASE_URL: https://opencode.ai/zen/go/v1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx drizzle-kit push --config=drizzle.config.ts
        continue-on-error: true

      - run: npm test

      - run: npm run build
